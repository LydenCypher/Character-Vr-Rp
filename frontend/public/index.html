    <link rel="apple-touch-icon" href="%PUBLIC_URL%/vr-rp-logo.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <style>
      .vr-glow {
        animation: vrGlow 3s ease-in-out infinite alternate;
      }
      
      @keyframes vrGlow {
        from { 
          box-shadow: 0 0 20px rgba(14, 165, 233, 0.5), 0 0 40px rgba(236, 72, 153, 0.3); 
        }
        to { 
          box-shadow: 0 0 40px rgba(14, 165, 233, 0.8), 0 0 60px rgba(236, 72, 153, 0.6), 0 0 80px rgba(139, 92, 246, 0.4); 
        }
      }
      
      .cyber-grid {
        background-image: 
          linear-gradient(rgba(14, 165, 233, 0.1) 1px, transparent 1px),
          linear-gradient(90deg, rgba(14, 165, 233, 0.1) 1px, transparent 1px);
        background-size: 60px 60px;
        animation: gridMove 25s linear infinite;
      }
      
      @keyframes gridMove {
        0% { background-position: 0 0; }
        100% { background-position: 60px 60px; }
      }
      
      .floating-orb {
        position: absolute;
        border-radius: 50%;
        background: linear-gradient(45deg, rgba(14, 165, 233, 0.6), rgba(236, 72, 153, 0.6));
        filter: blur(1px);
        animation: floatOrb 8s ease-in-out infinite;
      }
      
      @keyframes floatOrb {
        0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.7; }
        33% { transform: translate(30px, -30px) scale(1.1); opacity: 0.9; }
        66% { transform: translate(-20px, 20px) scale(0.9); opacity: 0.5; }
      }
      
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
        overflow-x: hidden;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this VR-RP application.</noscript>
    <div id="root"></div>
    
    <!-- Background Effects -->
    <div class="fixed inset-0 cyber-grid opacity-20 pointer-events-none"></div>
    <div class="floating-orb" style="top: 10%; left: 5%; width: 100px; height: 100px; animation-delay: 0s;"></div>
    <div class="floating-orb" style="top: 60%; right: 10%; width: 80px; height: 80px; animation-delay: 2s;"></div>
    <div class="floating-orb" style="bottom: 20%; left: 15%; width: 60px; height: 60px; animation-delay: 4s;"></div>
  </body>
</html>
